<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tuska 2026 — My Schedule</title>
  <!-- PWA: asennettava + offline-tuki (service worker rekisteröidään init():ssä). -->
  <meta name="theme-color" content="#0c0e12">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tuska">
  <style>
    /* Teema vaihtuu festarin mukaan: aktiivinen festari asettaa <html data-theme="...">.
       Värit asuvat täällä (ei datassa); festivals.json kertoo vain teeman nimen.
       Oletus :root = "steel" (käytetään myös kun festarilla ei ole theme-kenttää).
       Julistefontti on kondensoitu system-stack (offline-turvallinen, ei verkkohakua). */
    :root {
      --font-display: "Arial Narrow", "Roboto Condensed", "Helvetica Neue", system-ui, sans-serif;
      --bg:#14171A; --surface:#1E2329; --surface2:#262D34; --line:#2C343C;
      --ink:#E8EDF1; --muted:#95A1AB; --faint:#69737C;
      --accent:#4FA3C7; --on-accent:#06141B;
      --pick:#15271E; --pick-border:#3E9E73; --pick-ink:#CFE9DC;
      --live-bg:#102A33;
      --clash:#3A1614; --clash-border:#E5655F; --clash-note:#F2A6A1;
    }
    :root[data-theme="blackened"] {
      --bg:#0E0E10; --surface:#17171A; --surface2:#201F22; --line:#2A2622;
      --ink:#ECE7DE; --muted:#9A938A; --faint:#6E675E;
      --accent:#B23A36; --on-accent:#FBEFEA;
      --pick:#16271B; --pick-border:#3E8E5A; --pick-ink:#BFE9CF;
      --live-bg:#2A1413;
      --clash:#3A1412; --clash-border:#E5484D; --clash-note:#F5A3A0;
    }
    :root[data-theme="summer"] {
      --bg:#F5EEDD; --surface:#FFFDF6; --surface2:#ECE3CF; --line:#E0D5BC;
      --ink:#12313B; --muted:#5E6B62; --faint:#8A8170;
      --accent:#0E6E84; --on-accent:#FFFFFF;
      --pick:#DCEBDD; --pick-border:#2E8B57; --pick-ink:#1C5A3A;
      --live-bg:#D8EEF0;
      --clash:#FBE0D8; --clash-border:#D64430; --clash-note:#B23A1E;
    }
    * { box-sizing:border-box; }
    /* hidden-attribuutin on voitettava aina — muuten mikä tahansa display-arvon
       asettava luokkasääntö (esim. .comparebar { display:flex }) ohittaa selaimen
       oletuksen [hidden] { display:none } ja elementti jää pysyvästi näkyviin. */
    [hidden] { display:none !important; }
    body { background:var(--bg); color:var(--ink); font-family:system-ui,-apple-system,sans-serif; margin:0; padding:16px; }
    h1 { font-family:var(--font-display); font-size:30px; font-weight:700; text-transform:uppercase; letter-spacing:.02em; line-height:1; margin:0 0 4px; }
    .sub { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:16px; }
    button { font-size:14px; padding:8px 12px; background:var(--surface2); color:var(--ink); border:1px solid var(--line); border-radius:8px; cursor:pointer; }
    button.primary { background:var(--accent); border-color:var(--accent); color:var(--on-accent); font-weight:bold; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .fest-select { font-family:var(--font-display); text-transform:uppercase; letter-spacing:.03em; font-size:15px; padding:8px 12px; background:var(--surface2); color:var(--ink); border:1px solid var(--line); border-radius:8px; cursor:pointer; max-width:100%; }
    .txt-input { font-size:14px; padding:8px 12px; background:var(--surface2); color:var(--ink); border:1px solid var(--line); border-radius:8px; }
    .txt-input::placeholder { color:var(--faint); }
    #schedName { flex:0 1 190px; min-width:130px; }
    #searchBox { flex:1 1 200px; max-width:320px; }
    .filters { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; align-items:center; }
    .filters:last-of-type { margin-bottom:14px; }
    .filters button.active { background:var(--accent); border-color:var(--accent); color:var(--on-accent); font-weight:bold; }
    .filters .lbl { color:var(--muted); font-size:12px; margin-right:2px; }
    .st-inline { color:var(--muted); font-size:11px; font-weight:normal; }
    .count { color:var(--muted); font-size:13px; }
    .layout { display:flex; flex-wrap:wrap; gap:20px; align-items:flex-start; }
    .col-days { flex:2 1 520px; min-width:300px; }
    .col-mine { flex:1 1 280px; min-width:260px; position:sticky; top:16px; }
    .day { margin-bottom:22px; }
    .day h2 { font-family:var(--font-display); font-size:21px; font-weight:700; text-transform:uppercase; letter-spacing:.02em; color:var(--accent); margin:0 0 2px; }
    .day .gates { color:var(--faint); font-size:12px; margin-bottom:8px; }
    .stage { margin:10px 0 0; }
    .stage h3 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 5px; }
    .act { display:flex; justify-content:space-between; gap:10px; align-items:center; padding:7px 10px; border:1px solid var(--line); border-left:4px solid var(--line); border-radius:0 7px 7px 0; margin-bottom:5px; cursor:pointer; user-select:none; }
    .act:hover { background:color-mix(in srgb, var(--ink) 7%, transparent); }
    .act:focus-visible { outline:2px solid var(--accent); outline-offset:1px; }
    .act.picked { background:var(--pick); border-color:var(--pick-border); border-left-color:var(--pick-border); }
    .act .nm { font-weight:600; }
    .act .tm { color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; white-space:nowrap; }
    .act.picked .tm { color:var(--pick-ink); }
    .act.past { opacity:.4; }
    .act.live { background:var(--live-bg); border-color:var(--accent); border-left-color:var(--accent); }
    .act.live .tm { color:var(--accent); }
    .badge-now { display:inline-block; background:var(--accent); color:var(--on-accent); font-size:10px; font-weight:bold; padding:1px 5px; border-radius:4px; margin-left:6px; vertical-align:middle; letter-spacing:.04em; }
    .pastctrl { margin-bottom:14px; }
    .pastctrl button { font-size:13px; padding:6px 10px; }
    .panel { background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:14px; }
    .panel h2 { font-family:var(--font-display); font-size:18px; font-weight:700; text-transform:uppercase; letter-spacing:.02em; margin:0 0 10px; }
    .mine-day { margin-bottom:12px; }
    .mine-day .d { font-size:12px; color:var(--accent); text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px; font-weight:700; }
    .mine-item { display:flex; justify-content:space-between; gap:8px; padding:5px 8px; border-radius:6px; font-size:13px; }
    .mine-item .tm { color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
    .mine-item .st { color:var(--faint); font-size:11px; }
    .mine-item.clash { background:var(--clash); outline:1px solid var(--clash-border); }
    .clash-note { color:var(--clash-note); font-size:11px; margin-top:2px; }
    .mine-item.past { opacity:.45; }
    .mine-item.live { background:var(--live-bg); outline:1px solid var(--accent); }
    .mine-item.live .tm { color:var(--accent); }
    /* Kaverivertailu: kaverin valinnat katkoviivalla, yhteiset korostettuna. */
    .comparebar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; background:var(--live-bg); border:1px solid var(--accent); border-radius:10px; padding:10px 12px; margin-bottom:14px; font-size:13px; }
    .comparebar .txt { flex:1 1 220px; }
    .comparebar button { font-size:13px; padding:6px 10px; }
    .act.friendpick { outline:1.5px dashed var(--accent); outline-offset:-1px; }
    .mine-item.friend { opacity:.8; outline:1px dashed var(--accent); }
    .mine-item.both { background:var(--pick); }
    .tag { display:inline-block; font-size:10px; font-weight:bold; padding:1px 5px; border-radius:4px; margin-left:6px; vertical-align:middle; letter-spacing:.04em; }
    .tag.both { background:var(--pick-border); color:var(--on-accent); }
    .tag.friend { border:1px dashed var(--accent); color:var(--accent); }
    .panel-actions { margin-top:10px; }
    .panel-actions button { font-size:13px; padding:6px 10px; }
    /* QR-jakoikkuna */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:80; padding:16px; }
    .modal[hidden] { display:none; }
    .modal-box { background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:20px; text-align:center; max-width:340px; width:100%; }
    .modal-box h2 { font-family:var(--font-display); font-size:18px; font-weight:700; text-transform:uppercase; letter-spacing:.02em; margin:0 0 12px; overflow-wrap:anywhere; }
    .modal-box canvas { width:100%; max-width:260px; image-rendering:pixelated; border-radius:8px; }
    .qr-url { color:var(--muted); font-size:11px; word-break:break-all; margin:10px 0 14px; }
    .now-line { display:flex; align-items:center; gap:8px; margin:7px 0; color:var(--accent); font-size:11px; font-weight:bold; text-transform:uppercase; letter-spacing:.06em; }
    .now-line::before, .now-line::after { content:""; height:1px; background:var(--accent); flex:1; opacity:.55; }
    .empty { color:var(--faint); font-size:13px; }
    .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--accent); color:var(--on-accent); font-weight:bold; padding:10px 16px; border-radius:8px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:70; max-width:calc(100vw - 32px); text-align:center; }
    .toast.show { opacity:1; }

    /* Signature: clash-aikajana. Päivän valinnat piirretään palkkeina aika-akselille;
       päällekkäiset menevät omille riveilleen, jolloin törmäys näkyy yhdellä silmäyksellä. */
    .clashbar { position:relative; margin:2px 0 9px; }
    .clashbar .bar { position:absolute; height:18px; border-radius:4px; font-size:10px;
      line-height:18px; padding:0 5px; overflow:hidden; white-space:nowrap; color:var(--ink);
      background:color-mix(in srgb, var(--accent) 20%, var(--surface));
      border:1px solid color-mix(in srgb, var(--accent) 55%, var(--line)); }
    .clashbar .bar.clash { background:color-mix(in srgb, var(--clash-border) 26%, var(--surface));
      border-color:var(--clash-border); font-weight:600; }
    .clashbar .bar.past { opacity:.45; }
    .clashbar .nowmark { position:absolute; top:-2px; bottom:-2px; width:2px; background:var(--accent); }
    @media (prefers-reduced-motion: reduce) { .toast { transition:none; } }

    /* Mobiili: alapalkin välilehdet (Schedule / My timetable) ja kelluva "Now"-
       pikanappi. Työpöydällä piilossa, jolloin molemmat palstat näkyvät rinnakkain. */
    .tabbar { display:none; }
    .fab { display:none; }
    @media (max-width: 640px) {
      body { padding-bottom:72px; } /* tilaa kiinteälle alapalkille */
      .col-days, .col-mine { flex-basis:100%; min-width:0; }
      .col-mine { position:static; top:auto; }
      .act { padding:11px 12px; }       /* isompi kosketuskohta peukalolle */
      .mine-item { padding:9px 10px; font-size:14px; }
      #searchBox { flex-basis:100%; max-width:100%; } /* koko rivin levyinen hakukenttä */
      .toast { bottom:84px; }
      .tabbar { display:flex; position:fixed; left:0; right:0; bottom:0; z-index:60;
        background:var(--surface); border-top:1px solid var(--line); }
      .tabbar button { flex:1; border:none; border-radius:0; background:none;
        color:var(--muted); font-size:13px; font-weight:600; padding:13px 8px; }
      .tabbar button.active { color:var(--accent); box-shadow:inset 0 2px 0 var(--accent); }
      body.tab-schedule .col-mine { display:none; }
      body.tab-mine .col-days { display:none; }
      .fab { display:block; position:fixed; right:14px; bottom:60px; z-index:65;
        background:var(--accent); color:var(--on-accent); font-weight:bold; border:none;
        border-radius:22px; padding:11px 17px; box-shadow:0 3px 12px rgba(0,0,0,.45); }
      .fab[hidden] { display:none; }
    }
  </style>
</head>
<body>
  <h1 id="appTitle">Festival Schedule</h1>
  <div class="sub">Click the artists you want to see. Your selection lives in the page URL — copy it to save or share.</div>

  <div class="toolbar">
    <select id="festivalSelect" class="fest-select" aria-label="Choose festival"></select>
    <input id="schedName" class="txt-input" type="text" maxlength="40"
           placeholder="Name your schedule" aria-label="Schedule name (travels with the shared link)">
    <button id="shareBtn" class="primary">Copy share link</button>
    <button id="qrBtn" aria-label="Show share link as a QR code">QR</button>
    <button id="clearBtn">Clear all</button>
    <span class="count" id="count"></span>
  </div>

  <!-- Kaverivertailu: näkyy kun avattu jaettu linkki eroaa omista valinnoista. -->
  <div class="comparebar" id="compareBar" hidden>
    <span class="txt" id="compareText"></span>
    <button id="adoptBtn">Use these picks</button>
    <button id="compareClose">Done comparing</button>
  </div>

  <div class="filters" id="filters"></div>
  <div class="filters" id="viewmode"></div>
  <!-- Haku alimpana ohjaimista: tulokset alkavat heti kentän alta (tärkeää
       etenkin mobiilissa, jossa näppäimistö vie puolet ruudusta). -->
  <div class="filters">
    <input id="searchBox" class="txt-input" type="search"
           placeholder="Search artists…" aria-label="Search artists by name">
  </div>

  <div class="layout">
    <div class="col-days" id="days"></div>
    <div class="col-mine">
      <div class="panel">
        <h2>My timetable</h2>
        <div id="mine"></div>
        <div class="panel-actions">
          <button id="icsBtn" hidden>Add to calendar (.ics)</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <!-- QR-jakoikkuna: linkki QR-koodina kasvokkain jakamista varten. -->
  <div class="modal" id="qrModal" hidden role="dialog" aria-modal="true" aria-labelledby="qrTitle">
    <div class="modal-box">
      <h2 id="qrTitle">Scan to open</h2>
      <canvas id="qrCanvas" aria-label="QR code of your schedule link"></canvas>
      <div class="qr-url" id="qrUrl"></div>
      <button id="qrClose" class="primary">Close</button>
    </div>
  </div>

  <!-- Mobiilin alapalkki ja "Now"-pikanappi (näkyvät vain kapealla näytöllä). -->
  <button class="fab" id="nowFab" hidden>● Now</button>
  <div class="tabbar" id="tabbar">
    <button id="tabSchedule">Schedule</button>
    <button id="tabMine">My timetable</button>
  </div>

  <script src="qr.js"></script>
  <script>
  "use strict";

  let DATA = null;
  let FESTIVALS = [];        // festari-indeksi: [{ id, name, data }]
  let activeFestival = "";   // aktiivisen festarin id (kulkee URL:ssa ?f=...)
  const selected = new Set(); // act ids
  let dayFilter = ""; // "" = kaikki päivät, muuten päivän id (näkymäasetus, ei mene URL:iin)
  let viewMode = "stage"; // "stage" = lavajaottelu, "time" = aikajärjestys (näkymäasetus)
  let showPast = false; // näytetäänkö menneet päivät pääaikataulussa (oletuksena piilossa)
  let mobileTab = "schedule"; // mobiilin aktiivinen välilehti: "schedule" | "mine"
  let searchQuery = ""; // artistihaun suodatin, pienaakkosina (näkymäasetus, ei URL:iin)
  let myName = ""; // oma aikataulun nimi; kulkee jaetussa linkissä (#...&n=...)
  // Kaverivertailu: avatun jaetun linkin valinnat, kun ne eroavat omista.
  // Vain muistissa (ei URL:iin eikä localStorageen) — sulkeutuu sivun latauksessa.
  let compare = null; // null | { picks: Set<number>, name: string }

  const $ = (id) => document.getElementById(id);
  const toMin = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };

  // Esiintyjien/lavojen nimet syötetään innerHTML-templaatteihin, joten ne pitää
  // escapeta — nimissä esiintyy mm. "&" ja "<" (esim. "Pitch & Match", "I <3 Ibiza").
  const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  // Festari-illat jatkuvat keskiyön yli. Esiintyjä joka alkaa/loppuu aamuyöllä
  // (ennen puoltapäivää) kuuluu loogisesti edellisen illan jatkoksi, joten sille
  // lisätään 24 h järjestystä ja päällekkäisyyksien vertailua varten. Mikään
  // festaripäivä ei ala ennen puoltapäivää, joten raja klo 12:00 on turvallinen.
  const DAY_CUTOFF = 12 * 60;
  const eveMin = (t) => { const m = toMin(t); return m < DAY_CUTOFF ? m + 1440 : m; };

  // --- Aikatietoisuus: "nyt" suhteessa festarin aikatauluun ---
  // Festarin illat jatkuvat keskiyön yli, joten pelkkä päivämäärävertailu ei
  // riitä — lasketaan jokaiselle päivälle/esiintyjälle todellinen Date-ikkuna.
  // Testaus: lisää URL:iin ?now=2026-06-27T18:30 katsoaksesi mitä tahansa hetkeä.

  function nowDate() {
    const m = location.search.match(/[?&]now=([^&]+)/);
    if (m) { const d = new Date(decodeURIComponent(m[1])); if (!isNaN(d)) return d; }
    return new Date();
  }

  function dayDate(day) {
    // label esim. "Friday 26.6.2026" -> Date kyseisen päivän alkuun
    const m = day.label.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
    return m ? new Date(+m[3], +m[2] - 1, +m[1]) : null;
  }

  function at(day, hhmm) {
    const base = dayDate(day);
    if (!base) return null;
    const [h, mi] = hhmm.split(":").map(Number);
    const d = new Date(base.getFullYear(), base.getMonth(), base.getDate(), h, mi);
    // Aamuyön ajat (ennen puoltapäivää) kuuluvat seuraavalle kalenterivuorokaudelle.
    if (h * 60 + mi < DAY_CUTOFF) d.setDate(d.getDate() + 1);
    return d;
  }

  function dayWindow(day) {
    const start = at(day, day.gatesOpen);
    const end = at(day, day.gatesClose); // at() siirtää keskiyön yli menevän sulkemisajan
    return { start, end };
  }

  function dayStatus(day, now) {
    const { start, end } = dayWindow(day);
    if (now > end) return "past";
    if (now >= start) return "current";
    return "future";
  }

  // Koko tapahtuma ohi -> ei ole mitään mistä menneitä erottaisi, joten
  // näytetään silloin kaikki päivät oletuksena (eikä menneitä piiloteta).
  function eventAllPast(now) {
    return DATA.days.every((d) => dayStatus(d, now) === "past");
  }

  function actStatus(a, now) {
    const day = DATA.days.find((d) => d.id === a.day);
    const s = at(day, a.start), e = at(day, a.end);
    if (now >= e) return "past";
    if (now >= s) return "live";
    return "upcoming";
  }

  // --- URL-tila: valinnat bittimaskina base64url-muodossa hash-osassa (#s=...) ---
  // Bitti i = acts[i] valittu. Hash ei lähde palvelimelle -> valinta pysyy yksityisenä.
  // Koodin alussa on actien määrä ("60.<maski>"): jos ohjelma muuttuu linkin luonnin
  // jälkeen, määrä ei täsmää ja koodi hylätään sen sijaan, että bittimaski osuisi
  // hiljaa vääriin artisteihin. Etuliitteettömät koodit (vanhat linkit ja ennen tätä
  // versiota tallennetut varmuuskopiot) hyväksytään ilman määrätarkistusta.

  function encodeSelection() {
    if (!selected.size) return "";
    const n = DATA.acts.length;
    const bytes = new Uint8Array(Math.ceil(n / 8));
    for (const id of selected) bytes[id >> 3] |= 1 << (id & 7);
    let bin = "";
    for (const b of bytes) bin += String.fromCharCode(b);
    const mask = btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    return n + "." + mask;
  }

  // Palauttaa koodin valinnat Settinä, tai null jos koodi on viallinen tai tehty
  // eri ohjelmaversiolle. Tyhjä koodi on kelvollinen tyhjä valinta.
  function decodeToSet(code) {
    if (!code) return new Set();
    let mask = code;
    const m = code.match(/^(\d+)\.(.*)$/);
    if (m) {
      if (+m[1] !== DATA.acts.length) return null; // ohjelma muuttunut -> hylkää
      mask = m[2];
    }
    try {
      let b64 = mask.replace(/-/g, "+").replace(/_/g, "/");
      while (b64.length % 4) b64 += "=";
      const bin = atob(b64);
      const out = new Set();
      for (let i = 0; i < DATA.acts.length; i++) {
        const byte = bin.charCodeAt(i >> 3) || 0;
        if (byte & (1 << (i & 7))) out.add(i);
      }
      return out;
    } catch (e) {
      return null; // viallinen koodi
    }
  }

  function setSelection(set) {
    selected.clear();
    for (const id of set) selected.add(id);
  }

  function syncUrl() {
    const code = encodeSelection();
    // Aikataulun nimi kulkee hashissa valintojen mukana (&n=...). Hash ei lähde
    // palvelimelle. HUOM: nimi on vapaata käyttäjätekstiä — sitä EI saa koskaan
    // renderöidä innerHTML:llä (ks. MAINTENANCE.md:n turvallisuushuomautus).
    let hash = code ? "#s=" + code : "";
    if (code && myName) hash += "&n=" + encodeURIComponent(myName);
    history.replaceState(null, "", location.pathname + location.search + hash);
    saveLocal(code); // varmuuskopio: säilyy myös kun appi avataan ilman jaettua linkkiä
  }

  function hashCode() {
    const m = location.hash.match(/[#&]s=([^&]+)/);
    return m ? m[1] : "";
  }

  // Jaetun linkin mukana kulkeva aikataulun nimi (vapaata tekstiä -> vain textContent!).
  function nameParam() {
    const m = location.hash.match(/[#&]n=([^&]+)/);
    try { return m ? decodeURIComponent(m[1]).slice(0, 60) : ""; } catch (e) { return ""; }
  }

  // --- Paikallinen varmuuskopio (localStorage) ---
  // Hash kulkee jaetussa linkissä, mutta jos appi avataan kotinäytön ikonista
  // ilman linkkiä, valinta säilyy täällä. Avain on festarikohtainen, joten eri
  // vuosien valinnat eivät sekoitu keskenään.
  function storageKey() { return "festival-picks:" + (activeFestival || "default"); }

  function saveLocal(code) {
    try { localStorage.setItem(storageKey(), code); } catch (e) { /* esim. privaattitila */ }
  }

  function loadLocal() {
    try { return localStorage.getItem(storageKey()) || ""; } catch (e) { return ""; }
  }

  // Oma aikataulun nimi säilyy festarikohtaisesti kuten valinnatkin.
  function nameKey() { return "festival-name:" + (activeFestival || "default"); }

  function saveName(name) {
    try { localStorage.setItem(nameKey(), name); } catch (e) { /* privaattitila */ }
  }

  function loadName() {
    try { return localStorage.getItem(nameKey()) || ""; } catch (e) { return ""; }
  }

  // --- Renderöinti ---

  function actById(id) { return DATA.acts[id]; }

  function toggle(id, refocus) {
    if (selected.has(id)) selected.delete(id);
    else selected.add(id);
    syncUrl();
    render();
    // render() rakentaa rivit uudelleen -> palauta näppäimistöfokus samaan riviin.
    if (refocus) {
      const el = document.querySelector(`.act[data-id="${id}"]`);
      if (el) el.focus();
    }
  }

  // Valinnan palautus käynnistyksessä. Jaetun linkin avaaminen ei saa ylikirjoittaa
  // omaa tallennettua valintaa kysymättä: jos linkin valinta eroaa omasta, avataan
  // VERTAILUTILA — omat valinnat jäävät voimaan ja kaverin valinnat näkyvät
  // rinnalla, kunnes vertailu suljetaan tai kaverin valinnat otetaan käyttöön.
  // Eri ohjelmaversiolle tehty tai viallinen linkki hylätään ilmoituksella.
  function restoreSelection() {
    compare = null; // mahdollinen edellinen vertailu päättyy aina tässä
    const link = hashCode();
    const own = decodeToSet(loadLocal()) || new Set();
    if (!link) { setSelection(own); return; }
    const shared = decodeToSet(link);
    if (shared === null) {
      setSelection(own);
      toast("This link was made for an older line-up — showing your own picks instead.", 6000);
      return;
    }
    const same = shared.size === own.size && [...shared].every((id) => own.has(id));
    if (!shared.size || same) {
      // Tyhjä jaettu valinta ei kanna tietoa; identtinen ei vaadi vertailua.
      setSelection(own.size ? own : shared);
      return;
    }
    if (!own.size) {
      // Ei omia valintoja -> jaettu otetaan sellaisenaan käyttöön.
      setSelection(shared);
      const nm = nameParam();
      if (nm) toast(`Loaded “${nm}”`, 3000);
      return;
    }
    setSelection(own);
    compare = { picks: shared, name: nameParam() };
  }

  // Palauttaa setin valittujen id:istä jotka menevät päällekkäin toisen valitun kanssa.
  function clashingIds() {
    const picks = [...selected].map(actById).sort((a, b) =>
      a.day === b.day ? eveMin(a.start) - eveMin(b.start) : 0
    );
    const clash = new Set();
    for (let i = 0; i < picks.length; i++) {
      for (let j = i + 1; j < picks.length; j++) {
        if (picks[i].day !== picks[j].day) continue;
        // päällekkäisyys: alkaa ennen kuin toinen loppuu, molemmin puolin
        if (eveMin(picks[i].start) < eveMin(picks[j].end) && eveMin(picks[j].start) < eveMin(picks[i].end)) {
          clash.add(picks[i].id);
          clash.add(picks[j].id);
        }
      }
    }
    return clash;
  }

  // Artistihaku: suodattaa pääaikataulua nimellä (ei vaikuta valintaan/linkkiin).
  function matchesSearch(a) {
    return !searchQuery || a.name.toLowerCase().includes(searchQuery);
  }

  // My timetable -näkymän id:t: vertailutilassa omien ja kaverin valintojen unioni.
  function mineIds() {
    if (!compare) return [...selected];
    const u = new Set(selected);
    for (const id of compare.picks) u.add(id);
    return [...u];
  }

  function renderCompareBar() {
    const bar = $("compareBar");
    if (!compare) { bar.hidden = true; return; }
    const common = [...compare.picks].filter((id) => selected.has(id)).length;
    const who = compare.name ? `“${compare.name}”` : "a friend's schedule";
    // textContent: nimi on vapaata käyttäjätekstiä jaetusta linkistä (ei innerHTML!).
    $("compareText").textContent =
      `Comparing with ${who} — ${compare.picks.size} picks, ${common} in common. ` +
      `Their picks are dashed; shared ones are tagged in My timetable.`;
    bar.hidden = false;
  }

  function render() {
    const clash = clashingIds();
    renderCompareBar();
    renderFilters();
    renderDays(clash);
    renderMine(clash);
    $("count").textContent = `${selected.size} selected` + (clash.size ? ` · ${clash.size} overlapping` : "");
    $("clearBtn").disabled = selected.size === 0;
    $("shareBtn").disabled = false;
    $("icsBtn").hidden = selected.size === 0;
    // Mobiilivälilehden nimi näyttää valintojen määrän.
    $("tabMine").textContent = "My timetable" + (selected.size ? ` (${selected.size})` : "");
    // "Now"-pikanappi näkyy vain festarin aikana (kun jokin päivä on käynnissä).
    const now = nowDate();
    $("nowFab").hidden = !DATA.days.some((d) => dayStatus(d, now) === "current");
  }

  // Mobiilin välilehden vaihto: ohjaa body-luokalla kumpi palsta näkyy.
  function setTab(tab) {
    mobileTab = tab;
    document.body.classList.toggle("tab-schedule", tab === "schedule");
    document.body.classList.toggle("tab-mine", tab === "mine");
    $("tabSchedule").classList.toggle("active", tab === "schedule");
    $("tabMine").classList.toggle("active", tab === "mine");
    $("tabSchedule").setAttribute("aria-pressed", tab === "schedule" ? "true" : "false");
    $("tabMine").setAttribute("aria-pressed", tab === "mine" ? "true" : "false");
  }

  // "Now"-pikanappi: tuo kuluvan päivän näkyviin ja vierittää nykyhetkeen.
  function jumpToNow() {
    dayFilter = "";        // varmista että kuluva päivä on näkyvissä
    setTab("schedule");
    render();
    requestAnimationFrame(() => {
      const t = document.querySelector(".act.live")
        || document.querySelector("#today-anchor .act:not(.past)")
        || $("today-anchor");
      if (t) t.scrollIntoView({ behavior: "smooth", block: "center" });
    });
  }

  // Päiväsuodatin + näkymävalitsin (lavajaottelu / aikajärjestys). Pelkkiä
  // selausnäkymän asetuksia, eivät vaikuta valintaan eivätkä jaettavaan linkkiin.
  function renderFilters() {
    const wrap = $("filters");
    wrap.innerHTML = "";
    const dayOpts = [{ id: "", label: "All days" }].concat(
      DATA.days.map((d) => ({ id: d.id, label: d.label.split(" ")[0] }))
    );
    for (const o of dayOpts) {
      const b = document.createElement("button");
      b.textContent = o.label;
      if (dayFilter === o.id) b.className = "active";
      b.setAttribute("aria-pressed", dayFilter === o.id ? "true" : "false");
      b.onclick = () => { dayFilter = o.id; render(); };
      wrap.appendChild(b);
    }

    // Näkymävalitsin omalla rivillään, ettei sekoitu päivävalintaan.
    const vwrap = $("viewmode");
    vwrap.innerHTML = "";
    const lbl = document.createElement("span");
    lbl.className = "lbl";
    lbl.textContent = "View:";
    vwrap.appendChild(lbl);
    for (const o of [{ id: "stage", label: "By stage" }, { id: "time", label: "By time" }]) {
      const b = document.createElement("button");
      b.textContent = o.label;
      if (viewMode === o.id) b.className = "active";
      b.setAttribute("aria-pressed", viewMode === o.id ? "true" : "false");
      b.onclick = () => { viewMode = o.id; render(); };
      vwrap.appendChild(b);
    }
  }

  function actRow(a, withStage, now) {
    const el = document.createElement("div");
    const st = actStatus(a, now);
    const friend = compare && compare.picks.has(a.id);
    el.className = "act" + (selected.has(a.id) ? " picked" : "") +
      (friend ? " friendpick" : "") +
      (st === "past" ? " past" : st === "live" ? " live" : "");
    el.dataset.id = a.id;
    const stage = withStage ? ` <span class="st-inline">${esc(a.stage)}</span>` : "";
    const badge = st === "live" ? ` <span class="badge-now">NOW</span>` : "";
    el.innerHTML = `<span class="nm">${esc(a.name)}${stage}${badge}</span><span class="tm">${a.start}–${a.end}</span>`;
    // Saavutettavuus: rivi on vaihtopainike myös näppäimistölle ja ruudunlukijalle
    // (pelkkä div + onclick ei ole kummankaan tavoitettavissa).
    el.setAttribute("role", "button");
    el.tabIndex = 0;
    el.setAttribute("aria-pressed", selected.has(a.id) ? "true" : "false");
    el.setAttribute("aria-label",
      `${a.name}, ${a.start}–${a.end}, ${a.stage}` + (st === "live" ? ", on stage now" : "") +
      (friend ? ", picked by your friend" : ""));
    el.onclick = () => toggle(a.id);
    el.onkeydown = (ev) => {
      if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); toggle(a.id, true); }
    };
    return el;
  }

  // Jaettu "Show/Hide past days" -nappi. Sama showPast-tila ohjaa molempia näkymiä,
  // joten nappi tarvitaan kummassakin (mobiilissa vain toinen on kerrallaan näkyvissä).
  function pastToggle(count) {
    const ctrl = document.createElement("div");
    ctrl.className = "pastctrl";
    const b = document.createElement("button");
    b.textContent = (showPast ? "Hide past days" : "Show past days") + ` (${count})`;
    if (showPast) b.className = "active";
    b.setAttribute("aria-pressed", showPast ? "true" : "false");
    b.onclick = () => { showPast = !showPast; render(); };
    ctrl.appendChild(b);
    return ctrl;
  }

  function renderDays(clash) {
    const wrap = $("days");
    wrap.innerHTML = "";
    const now = nowDate();
    const allPast = eventAllPast(now);
    const searching = !!searchQuery;

    // "Näytä menneet päivät" -nappi vain kun selataan kaikkia päiviä ja menneitä
    // päiviä on olemassa. Jos koko tapahtuma on ohi, nappia ei näytetä (kaikki
    // näkyy joka tapauksessa). Yksittäisen päivän suodatus näyttää päivän aina.
    // Haku etsii myös menneiltä päiviltä, joten nappi on silloin tarpeeton.
    if (!dayFilter && !allPast && !searching) {
      const pastCount = DATA.days.filter((d) => dayStatus(d, now) === "past").length;
      if (pastCount) wrap.appendChild(pastToggle(pastCount));
    }

    let shownActs = 0;
    for (const day of DATA.days) {
      if (dayFilter && day.id !== dayFilter) continue;
      // Piilota menneet päivät oletuksena (vain "kaikki päivät" -näkymässä).
      // Haettaessa mennytkin päivä näytetään, jos sieltä löytyy osuma.
      if (!dayFilter && !showPast && !allPast && !searching && dayStatus(day, now) === "past") continue;
      const dayActs = DATA.acts.filter((a) => a.day === day.id && matchesSearch(a));
      if (searching && !dayActs.length) continue; // päivä ilman osumia piiloon haussa
      const dEl = document.createElement("div");
      dEl.className = "day";
      if (dayStatus(day, now) === "current") dEl.id = "today-anchor"; // "Now"-napin kohde
      dEl.innerHTML = `<h2>${day.label}</h2><div class="gates">Gates ${day.gatesOpen}–${day.gatesClose}</div>`;

      if (viewMode === "time") {
        // Aikajärjestys lavasta riippumatta; lava näkyy nimen perässä.
        const acts = dayActs.slice()
          .sort((a, b) => eveMin(a.start) - eveMin(b.start) || a.stage.localeCompare(b.stage));
        for (const a of acts) dEl.appendChild(actRow(a, true, now));
      } else {
        // Lavajaottelu.
        for (const stage of DATA.stages) {
          const acts = dayActs
            .filter((a) => a.stage === stage)
            .sort((a, b) => eveMin(a.start) - eveMin(b.start));
          if (!acts.length) continue;
          const sEl = document.createElement("div");
          sEl.className = "stage";
          sEl.innerHTML = `<h3>${stage}</h3>`;
          for (const a of acts) sEl.appendChild(actRow(a, false, now));
          dEl.appendChild(sEl);
        }
      }
      wrap.appendChild(dEl);
      shownActs += dayActs.length;
    }

    if (searching && !shownActs) {
      const msg = document.createElement("div");
      msg.className = "empty";
      msg.textContent = `No artists match “${$("searchBox").value.trim()}”.`;
      wrap.appendChild(msg);
    }
  }

  function renderMine(clash) {
    const wrap = $("mine");
    wrap.innerHTML = "";
    const ids = mineIds(); // vertailutilassa omien ja kaverin valintojen unioni
    if (!ids.length) {
      wrap.innerHTML = '<div class="empty">No artists selected yet.</div>';
      return;
    }
    const now = nowDate();
    const allPast = eventAllPast(now);

    // "Show/Hide past days" myös tässä näkymässä — mobiilissa pääaikataulu (jossa
    // sama nappi on) on piilossa My timetable -välilehdellä. Lasketaan menneet
    // päivät, joilla on omia valintoja (vain ne ovat tässä näkymässä piilossa).
    if (!allPast) {
      const pastPickDays = DATA.days.filter((d) =>
        dayStatus(d, now) === "past" && ids.some((id) => actById(id).day === d.id)
      ).length;
      if (pastPickDays) wrap.appendChild(pastToggle(pastPickDays));
    }

    let shownDays = 0;
    for (const day of DATA.days) {
      // Piilota menneet päivät oletuksena — sama "Show past days" -nappi
      // paljastaa ne yhtä aikaa sekä pääaikataulussa että My timetablessa.
      // Jos koko tapahtuma on ohi, näytetään kaikki päivät oletuksena.
      if (!showPast && !allPast && dayStatus(day, now) === "past") continue;
      const acts = ids.map(actById)
        .filter((a) => a.day === day.id)
        .sort((a, b) => eveMin(a.start) - eveMin(b.start));
      if (!acts.length) continue;
      const dEl = document.createElement("div");
      dEl.className = "mine-day";
      dEl.innerHTML = `<div class="d">${day.label}</div>`;
      const isCurrent = dayStatus(day, now) === "current";
      // Signature: päivän valintojen aikajana (näyttää törmäykset palkkeina).
      // Vertailutilassa aikajana näyttää vain omat valinnat (törmäyslogiikan tapaan).
      const tl = clashTimeline(day, acts.filter((a) => selected.has(a.id)), clash, now, isCurrent);
      if (tl) dEl.appendChild(tl);
      let nowLineDone = false;
      for (const a of acts) {
        const st = actStatus(a, now);
        // Kuluvana päivänä: "nyt"-viiva ennen ensimmäistä esiintyjää joka ei ole
        // vielä päättynyt -> näkee yhdellä silmäyksellä missä kohtaa mennään.
        if (isCurrent && !nowLineDone && st !== "past") {
          dEl.appendChild(nowLine(now));
          nowLineDone = true;
        }
        const badge = st === "live" ? ` <span class="badge-now">NOW</span>` : "";
        // Vertailumerkinnät: yhteinen valinta / vain kaverin valinta. Kiinteät
        // sanat ("both"/"friend") — kaverin nimeä ei laiteta innerHTML:ään.
        const both = compare && selected.has(a.id) && compare.picks.has(a.id);
        const friendOnly = compare && !selected.has(a.id);
        const tag = both ? ` <span class="tag both">both</span>` :
          friendOnly ? ` <span class="tag friend">friend</span>` : "";
        const item = document.createElement("div");
        item.className = "mine-item" + (clash.has(a.id) ? " clash" : "") +
          (both ? " both" : "") + (friendOnly ? " friend" : "") +
          (st === "past" ? " past" : st === "live" ? " live" : "");
        item.innerHTML =
          `<span><span class="nm">${esc(a.name)}${badge}${tag}</span><br><span class="st">${esc(a.stage)}</span></span>` +
          `<span class="tm">${a.start}–${a.end}</span>`;
        dEl.appendChild(item);
      }
      // Kaikki kuluvan päivän valinnat jo ohi -> viiva listan loppuun.
      if (isCurrent && !nowLineDone) dEl.appendChild(nowLine(now));
      wrap.appendChild(dEl);
      shownDays++;
    }
    // Valintoja on, mutta kaikki menneillä (piilotetuilla) päivillä. Lisätään viesti
    // appendillä (ei innerHTML:llä), jottei yllä lisätty "Show past days" -nappi katoa.
    if (!shownDays) {
      const msg = document.createElement("div");
      msg.className = "empty";
      msg.textContent = "All your picks are on past days — tap “Show past days” above.";
      wrap.appendChild(msg);
      return;
    }
    if (clash.size) {
      const note = document.createElement("div");
      note.className = "clash-note";
      note.textContent = "⚠ Highlighted artists overlap in time.";
      wrap.appendChild(note);
    }
  }

  function nowLine(now) {
    const el = document.createElement("div");
    el.className = "now-line";
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    el.textContent = `now ${hh}:${mm}`;
    return el;
  }

  // Signature: päivän valinnat aika-akselilla. Päällekkäiset menevät omille
  // riveilleen (greedy lane -jako), joten törmäys näkyy konkreettisesti palkkien
  // limittäisyytenä. Käytetään eveMin-arvoja, jotta keskiyön yli menevät osuvat oikein.
  function clashTimeline(day, acts, clash, now, isCurrent) {
    if (acts.length < 2) return null; // aikajana tuo lisäarvoa vasta useammalla valinnalla
    const items = acts.map((a) => ({ a, s: eveMin(a.start), e: eveMin(a.end) }))
      .sort((x, y) => x.s - y.s);
    const min = Math.min(...items.map((i) => i.s));
    const max = Math.max(...items.map((i) => i.e));
    const span = max - min;
    if (span <= 0) return null;

    const laneEnds = []; // kunkin rivin viimeisin loppuaika
    for (const it of items) {
      let lane = laneEnds.findIndex((end) => end <= it.s);
      if (lane === -1) { lane = laneEnds.length; laneEnds.push(it.e); }
      else laneEnds[lane] = it.e;
      it.lane = lane;
    }

    const rowH = 22;
    const wrap = document.createElement("div");
    wrap.className = "clashbar";
    wrap.style.height = (laneEnds.length * rowH - 4) + "px";
    for (const it of items) {
      const st = actStatus(it.a, now);
      const bar = document.createElement("div");
      bar.className = "bar" + (clash.has(it.a.id) ? " clash" : "") + (st === "past" ? " past" : "");
      bar.style.left = ((it.s - min) / span * 100) + "%";
      bar.style.width = Math.max((it.e - it.s) / span * 100, 4) + "%";
      bar.style.top = (it.lane * rowH) + "px";
      bar.textContent = it.a.name;
      bar.title = `${it.a.name} · ${it.a.start}–${it.a.end} · ${it.a.stage}`;
      wrap.appendChild(bar);
    }
    if (isCurrent) {
      // now suhteessa päivän kalenteripäivään: minuutit dayDate-keskiyöstä vastaavat eveMin-asteikkoa.
      const nowPos = (now - dayDate(day)) / 60000;
      if (nowPos >= min && nowPos <= max) {
        const m = document.createElement("div");
        m.className = "nowmark";
        m.style.left = ((nowPos - min) / span * 100) + "%";
        wrap.appendChild(m);
      }
    }
    return wrap;
  }

  let toastTimer = null;
  function toast(msg, ms) {
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), ms || 1600);
  }

  // --- Kalenterivienti (ICS): omat valinnat .ics-tiedostona ---
  // Ei backendia: tiedosto rakennetaan selaimessa ja ladataan Blobina. Ajat
  // kirjoitetaan paikallisena ("floating") aikana — festari on paikallinen
  // tapahtuma, ja at() hoitaa keskiyön yli menevät esiintymiset oikein.

  function icsEscape(s) {
    return String(s).replace(/\\/g, "\\\\").replace(/;/g, "\\;")
      .replace(/,/g, "\\,").replace(/\r?\n/g, "\\n");
  }

  function icsDate(d) {
    const p = (n) => String(n).padStart(2, "0");
    return d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) +
      "T" + p(d.getHours()) + p(d.getMinutes()) + "00";
  }

  function buildIcs() {
    // DTSTAMP on RFC:n mukaan UTC-aikaa.
    const stamp = new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d+/, "");
    const lines = [
      "BEGIN:VCALENDAR", "VERSION:2.0",
      "PRODID:-//festival-schedule//EN", "CALSCALE:GREGORIAN",
    ];
    const picks = [...selected].map(actById)
      .sort((a, b) => a.day === b.day ? eveMin(a.start) - eveMin(b.start) : 0);
    for (const a of picks) {
      const day = DATA.days.find((d) => d.id === a.day);
      const s = day && at(day, a.start), e = day && at(day, a.end);
      if (!s || !e) continue;
      lines.push(
        "BEGIN:VEVENT",
        `UID:${activeFestival}-${a.id}@festival-schedule`,
        `DTSTAMP:${stamp}`,
        `DTSTART:${icsDate(s)}`,
        `DTEND:${icsDate(e)}`,
        `SUMMARY:${icsEscape(a.name)}`,
        `LOCATION:${icsEscape(a.stage + ", " + DATA.festival)}`,
        "END:VEVENT"
      );
    }
    lines.push("END:VCALENDAR");
    return lines.join("\r\n") + "\r\n";
  }

  function exportIcs() {
    const blob = new Blob([buildIcs()], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = (activeFestival || "festival") + "-schedule.ics";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // --- QR-jako: linkki QR-koodina (kätevä festarilla kasvokkain) ---
  // qrEncode tulee vendoroidusta qr.js:stä — toimii offline, ei CDN:ää.
  function showQr() {
    if (typeof qrEncode === "undefined") { toast("QR code unavailable"); return; }
    syncUrl();
    const url = location.href;
    let matrix;
    try { matrix = qrEncode(url); } catch (e) { toast("Link too long for a QR code"); return; }
    const canvas = $("qrCanvas");
    const scale = 6, quiet = 4; // quiet zone: 4 moduulin vaalea reunus (spec)
    const n = matrix.length;
    canvas.width = canvas.height = (n + quiet * 2) * scale;
    const g = canvas.getContext("2d");
    g.fillStyle = "#fff"; // aina musta valkoisella — luotettavin lukea, teemasta riippumatta
    g.fillRect(0, 0, canvas.width, canvas.height);
    g.fillStyle = "#000";
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        if (matrix[r][c]) g.fillRect((c + quiet) * scale, (r + quiet) * scale, scale, scale);
      }
    }
    // textContent: nimi ja URL ovat vapaata tekstiä (ei innerHTML!).
    $("qrTitle").textContent = (myName ? myName + " — " : "") + "Scan to open";
    $("qrUrl").textContent = url;
    $("qrModal").hidden = false;
    $("qrClose").focus();
  }

  async function share() {
    syncUrl();
    const url = location.href;
    // Mobiilissa natiivi jakovalikko (WhatsApp, viestit…); muuten leikepöytä.
    if (navigator.share) {
      try {
        await navigator.share({ title: (myName ? myName + " — " : "") + `${DATA.festival} — My Schedule`, url });
        return;
      } catch (e) {
        if (e && e.name === "AbortError") return; // käyttäjä perui jaon
        // muu virhe -> fallback leikepöytään
      }
    }
    try {
      await navigator.clipboard.writeText(url);
      toast("Link copied to clipboard");
    } catch (e) {
      // clipboard ei käytettävissä (esim. ei-HTTPS) -> näytä URL
      prompt("Copy your schedule link:", url);
    }
  }

  // --- Festarivalinta ---
  // Aktiivinen festari kulkee URL:n query-osassa (?f=<id>), jotta jaettu linkki ja
  // sivun uudelleenlataus muistavat sen. Valinnat (#s=...) ovat festarikohtaisia:
  // bittimaski on sidottu juuri sen festarin acts-listaan, joten festaria
  // vaihdettaessa ladataan sivu uudelleen puhtaalta pöydältä (ilman vanhaa hashia).
  function festivalParam() {
    const m = location.search.match(/[?&]f=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : "";
  }

  function lastFestival() {
    try { return localStorage.getItem("festival-active") || ""; } catch (e) { return ""; }
  }

  function rememberFestival(id) {
    try { localStorage.setItem("festival-active", id); } catch (e) { /* privaattitila */ }
  }

  // Asettaa aktiivisen festarin teeman (palette vaihtuu CSS-muuttujien kautta) ja
  // päivittää selaimen/PWA:n theme-color-värin taustan mukaan.
  function applyTheme(name) {
    document.documentElement.dataset.theme = name || "steel";
    const bg = getComputedStyle(document.documentElement).getPropertyValue("--bg").trim();
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta && bg) meta.setAttribute("content", bg);
  }

  // Rakentaa osoitteen jossa ?f=<id> on asetettu mutta muut query-parametrit
  // (esim. testaukseen tarkoitettu ?now=) säilyvät. keepHash=false pudottaa
  // valinnat (#s=...), mitä käytetään festaria vaihdettaessa.
  function urlWithFestival(id, keepHash) {
    const params = new URLSearchParams(location.search);
    params.set("f", id);
    return location.pathname + "?" + params.toString() + (keepHash ? location.hash : "");
  }

  function chooseFestival() {
    const ids = FESTIVALS.map((f) => f.id);
    const param = festivalParam();
    if (ids.includes(param)) return param;
    const last = lastFestival();
    if (ids.includes(last)) return last;
    return FESTIVALS[0].id; // oletus: listan ensimmäinen (tuorein/tuleva)
  }

  function populateFestivalSelect() {
    const sel = $("festivalSelect");
    sel.innerHTML = "";
    for (const f of FESTIVALS) {
      const o = document.createElement("option");
      o.value = f.id;
      o.textContent = f.name;
      if (f.id === activeFestival) o.selected = true;
      sel.appendChild(o);
    }
    // Festaria vaihdettaessa navigoidaan uuteen ?f=-osoitteeseen ILMAN hashia,
    // jolloin init() lataa oikean datan ja palauttaa sen festarin omat valinnat.
    sel.onchange = () => {
      location.assign(urlWithFestival(sel.value, false));
    };
  }

  async function fetchJson(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(url + ": HTTP " + r.status);
    return r.json();
  }

  // Datan lataus epäonnistui (esim. ei verkkoa ennen ensimmäistä käyntiä, tai
  // palvelinvirhe): näytä viesti ja uudelleenyritys tyhjän sivun sijaan.
  function showLoadError() {
    $("shareBtn").disabled = true;
    $("clearBtn").disabled = true;
    const wrap = $("days");
    wrap.innerHTML = "";
    const msg = document.createElement("div");
    msg.className = "empty";
    msg.textContent = "Failed to load the schedule. Check your connection and try again.";
    const retry = document.createElement("button");
    retry.textContent = "Retry";
    retry.style.marginTop = "10px";
    retry.onclick = () => location.reload();
    wrap.appendChild(msg);
    wrap.appendChild(retry);
  }

  async function init() {
    // PWA: rekisteröi service worker offline-tukea varten (vaatii HTTPS:n;
    // epäonnistuu hiljaa esim. file://-protokollalla, mikä on ok). Rekisteröidään
    // ennen datan latausta, jotta offline-tuki asentuu vaikka lataus epäonnistuisi.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }

    try {
      const reg = await fetchJson("festivals.json");
      FESTIVALS = reg.festivals || [];
      if (!FESTIVALS.length) throw new Error("festivals.json: empty registry");
      activeFestival = chooseFestival();
      rememberFestival(activeFestival);
      const fest = FESTIVALS.find((f) => f.id === activeFestival);
      applyTheme(fest.theme);

      // Varmista että ?f= on URL:ssa (jotta jaettu linkki ja syncUrl säilyttävät sen).
      if (festivalParam() !== activeFestival) {
        history.replaceState(null, "", urlWithFestival(activeFestival, true));
      }

      DATA = await fetchJson(fest.data);
    } catch (e) {
      showLoadError();
      return;
    }
    document.title = `${DATA.festival} — My Schedule`;
    $("appTitle").textContent = `${DATA.festival} — My Schedule`;
    populateFestivalSelect();
    myName = loadName();
    $("schedName").value = myName;
    // Palauta valinta: jaettu linkki ja/tai oma varmuuskopio (ristiriita avaa
    // vertailutilan). syncUrl kirjoittaa hashiin OMAN valinnan — vertailu on
    // vain muistissa, joten jako ja uudelleenlataus toimivat omilla valinnoilla.
    restoreSelection();
    syncUrl();
    $("schedName").oninput = () => {
      myName = $("schedName").value.trim();
      saveName(myName);
      syncUrl();
    };
    $("adoptBtn").onclick = () => {
      if (!compare) return;
      setSelection(compare.picks);
      compare = null;
      syncUrl();
      render();
      toast("Loaded their picks");
    };
    $("compareClose").onclick = () => { compare = null; render(); };
    $("searchBox").oninput = () => {
      searchQuery = $("searchBox").value.trim().toLowerCase();
      render();
    };
    $("icsBtn").onclick = exportIcs;
    $("qrBtn").onclick = showQr;
    $("qrClose").onclick = () => { $("qrModal").hidden = true; };
    $("qrModal").onclick = (e) => { if (e.target === $("qrModal")) $("qrModal").hidden = true; };
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !$("qrModal").hidden) $("qrModal").hidden = true;
    });
    $("shareBtn").onclick = share;
    $("clearBtn").onclick = () => {
      if (!selected.size) return;
      const n = selected.size;
      if (!confirm(`Clear all ${n} selected artist${n === 1 ? "" : "s"}?`)) return;
      selected.clear(); syncUrl(); render();
    };
    $("tabSchedule").onclick = () => setTab("schedule");
    $("tabMine").onclick = () => setTab("mine");
    $("nowFab").onclick = jumpToNow;
    setTab(mobileTab);
    // Hashin vaihtuminen (jaettu linkki liitettynä jo auki olevan sivun
    // osoiteriville — sivu ei lataudu uudelleen, vain hash vaihtuu). Sama
    // logiikka kuin käynnistyksessä: eroava valinta avaa vertailutilan omia
    // valintoja ylikirjoittamatta, viallinen/vanhentunut linkki hylätään.
    window.addEventListener("hashchange", () => {
      restoreSelection();
      syncUrl();
      render();
    });
    render();
    // Päivitä mennyt/live/tuleva-tilat minuutin välein ilman sivun lataamista.
    setInterval(render, 60000);
  }

  document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
